name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality and unit contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.16.0
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run knip
      - run: npm run css:check
      - run: npm run test:coverage
      - run: npm run test:ui
      - run: npm run build
      - run: npm run bundle:check
      - run: npm run audit:all
      - run: npm run audit:prod
      - run: npm run evidence
      - name: Upload quality evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quality-evidence-${{ github.sha }}
          path: |
            coverage/
            artifacts/evidence-summary.json
            artifacts/bundle-summary.json
          if-no-files-found: error
          retention-days: 30

  rls-integration:
    name: Supabase migrations and RLS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.16.0
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Start pinned local Supabase
        run: npx supabase start -x studio,imgproxy,edge-runtime,logflare,vector,supavisor
      - run: npx supabase db reset
      - name: Test empty-database migration and owner/MFA policies
        run: npm run test:integration
      - name: Capture Supabase status
        if: always()
        run: npx supabase status --output json > supabase-status.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: rls-evidence-${{ github.sha }}
          path: supabase-status.json
          retention-days: 30

  e2e:
    name: Playwright demo path
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.16.0
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npx playwright install --with-deps chromium
      - name: Run E2E and browser-console audit
        run: npm run test:e2e
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-evidence-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 30

  container:
    name: Linux amd64 container and SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build Linux/amd64 portability image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: lumixia-brief:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image for critical vulnerabilities
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: lumixia-brief:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          scanners: vuln
          hide-progress: true
          limit-severities-for-sarif: true
          version: v0.72.0
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: lumixia-brief:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: container-security-${{ github.sha }}
          path: |
            trivy-results.sarif
            sbom.cdx.json
          retention-days: 30

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Scan repository history for secrets
        run: |
          mkdir -p artifacts
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.24.3 \
            detect --source=/repo --redact --no-banner \
            --report-format=json --report-path=/repo/artifacts/gitleaks.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: secret-scan-${{ github.sha }}
          path: artifacts/gitleaks.json
          if-no-files-found: error
          retention-days: 30

  ci-success:
    name: Required CI
    if: always()
    needs: [quality, rls-integration, e2e, container, secret-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Require every gate
        run: |
          test "${{ needs.quality.result }}" = "success"
          test "${{ needs.rls-integration.result }}" = "success"
          test "${{ needs.e2e.result }}" = "success"
          test "${{ needs.container.result }}" = "success"
          test "${{ needs.secret-scan.result }}" = "success"

  production-migration:
    name: Production migration gate
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.PRODUCTION_RELEASE_ENABLED == 'true'
    needs: [ci-success]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.16.0
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Verify the migration source SHA
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
      - name: Apply forward-only production migrations
        shell: bash
        run: |
          npx supabase link --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
