name: Production release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success' && vars.PRODUCTION_RELEASE_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.16.0
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Apply forward-only production migrations
        run: |
          npx supabase link --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Build and deploy the verified commit
        run: |
          npx --yes --loglevel=error vercel@56.1.0 pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx --yes --loglevel=error vercel@56.1.0 build --prod --token="$VERCEL_TOKEN"
          npx --yes --loglevel=error vercel@56.1.0 deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Verify public production health
        shell: bash
        run: |
          for endpoint in /api/health /api/ready; do
            status=""
            for attempt in {1..12}; do
              status="$(curl --silent --show-error --output /tmp/health-response.json --write-out '%{http_code}' "${APP_ORIGIN}${endpoint}")"
              if [ "$status" = "200" ]; then
                break
              fi
              if [ "$attempt" -lt 12 ]; then
                sleep 5
              fi
            done

            if [ "$status" != "200" ]; then
              echo "Production check failed for ${endpoint} with HTTP ${status}."
              exit 1
            fi
          done
        env:
          APP_ORIGIN: https://brief.z2zs.space
