name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality and unit contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run audit:prod
      - run: npm run evidence
      - name: Upload quality evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-evidence-${{ github.sha }}
          path: |
            coverage/
            artifacts/evidence-summary.json
          if-no-files-found: error
          retention-days: 30

  rls-integration:
    name: Supabase migrations and RLS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Start pinned local Supabase
        run: npx supabase start -x studio,imgproxy,inbucket,edge-runtime,logflare,vector,supavisor
      - run: npx supabase db reset
      - name: Test empty-database migration and owner/MFA policies
        run: npm run test:integration
        env:
          RUN_SUPABASE_INTEGRATION: 'true'
      - name: Capture Supabase status
        if: always()
        run: npx supabase status --output json > supabase-status.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rls-evidence-${{ github.sha }}
          path: supabase-status.json
          retention-days: 30

  e2e:
    name: Playwright demo path
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-evidence-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 30

  container:
    name: Linux amd64 container and SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Linux/amd64 portability image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: lumixia-brief:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image for critical vulnerabilities
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: lumixia-brief:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: lumixia-brief:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: container-security-${{ github.sha }}
          path: |
            trivy-results.sarif
            sbom.cdx.json
          retention-days: 30

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci-success:
    name: Required CI
    if: always()
    needs: [quality, rls-integration, e2e, container, secret-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Require every gate
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: test "$RESULTS" = "success,success,success,success,success"
